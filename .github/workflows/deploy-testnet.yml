name: Deploy HeliosVault (Testnet)

on:
  workflow_dispatch:
    inputs:
      node_address:
        description: "Casper Testnet node RPC base URL"
        default: "https://node.testnet.casper.network"
      events_url:
        description: "Casper Testnet node SSE events URL"
        default: "https://node.testnet.casper.network/events"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt
      - name: Install binaryen
        run: |
          set -euo pipefail
          TAG=$(curl -sSfL https://api.github.com/repos/WebAssembly/binaryen/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "Installing binaryen $TAG"
          curl -sSfL "https://github.com/WebAssembly/binaryen/releases/download/${TAG}/binaryen-${TAG}-x86_64-linux.tar.gz" -o /tmp/binaryen.tar.gz
          sudo tar -xzf /tmp/binaryen.tar.gz -C /usr/local --strip-components=1
          wasm-opt --version
      - name: Install cargo-odra
        run: cargo install cargo-odra --locked
      - name: Build WASM
        run: cargo odra build || echo "::warning::wasm-opt non-zero; .wasm already emitted, continuing"
      - name: Write secret key + livenet env
        env:
          CASPER_SECRET_KEY_B64: ${{ secrets.CASPER_SECRET_KEY_B64 }} 
          CSPR_CLOUD_AUTH_TOKEN: ${{ secrets.CSPR_CLOUD_AUTH_TOKEN }} 
          NODE_ADDRESS: ${{ inputs.node_address }} 
          EVENTS_URL: ${{ inputs.events_url }} 
        run: |
          set -euo pipefail
          if [ -z "${CASPER_SECRET_KEY_B64:-}" ]; then echo "Missing secret CASPER_SECRET_KEY_B64"; exit 1; fi
          mkdir -p keys
          echo "$CASPER_SECRET_KEY_B64" | base64 -d > keys/secret_key.pem; echo "BYTES=$(wc -c < keys/secret_key.pem)"; head -n1 keys/secret_key.pem; tail -n1 keys/secret_key.pem; openssl pkey -in keys/secret_key.pem -noout || echo PEM_PARSE_FAILED
          {
            echo "ODRA_CASPER_LIVENET_SECRET_KEY_PATH=./keys/secret_key.pem"
            echo "ODRA_CASPER_LIVENET_NODE_ADDRESS=${NODE_ADDRESS}"
            echo "ODRA_CASPER_LIVENET_EVENTS_URL=${EVENTS_URL}"
            echo "ODRA_CASPER_LIVENET_CHAIN_NAME=casper-test"
            echo "CSPR_CLOUD_AUTH_TOKEN=${CSPR_CLOUD_AUTH_TOKEN:-}"
          } > casper-test.env
          echo "---- casper-test.env (token hidden) ----"
          grep -v CSPR_CLOUD_AUTH_TOKEN casper-test.env
      - name: Deploy + smoke test (on-chain)
        run: pwd; ls -la keys || true; RUST_BACKTRACE=full RUST_LOG=debug ODRA_CASPER_LIVENET_ENV=casper-test CSPR_CLOUD_AUTH_TOKEN=${{ secrets.CSPR_CLOUD_AUTH_TOKEN }} cargo run --bin helios_vault_on_livenet --features livenet
