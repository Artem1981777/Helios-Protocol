name: Build HeliosVault (WASM)

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/build-contract.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wabt (wasm-strip)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install cargo-odra
        run: cargo install cargo-odra --locked

      - name: Run tests (MockVM backend)
        run: cargo odra test

      - name: Build WASM
        run: cargo odra build

      - name: Upload compiled WASM
        uses: actions/upload-artifact@v4
        with:
          name: helios-vault-wasm
          path: contracts/wasm/*.wasm
          if-no-files-found: error
