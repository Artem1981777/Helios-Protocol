name: Build HeliosVault (WASM)

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/build-contract.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + wasm target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wabt (wasm-strip)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install binaryen (recent wasm-opt with --signext-lowering)
        run: |
          set -euo pipefail
          TAG=$(curl -sSfL https://api.github.com/repos/WebAssembly/binaryen/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "Installing binaryen $TAG"
          curl -sSfL "https://github.com/WebAssembly/binaryen/releases/download/${TAG}/binaryen-${TAG}-x86_64-linux.tar.gz" -o /tmp/binaryen.tar.gz
          sudo tar -xzf /tmp/binaryen.tar.gz -C /usr/local --strip-components=1
          wasm-opt --version

      - name: Install cargo-odra
        run: cargo install cargo-odra --locked

      - name: Run tests (MockVM backend)
        run: cargo odra test

      - name: Build WASM
        run: cargo odra build || echo "::warning::cargo odra build exited non-zero (likely the post-build wasm-opt step); the .wasm was already emitted before optimization, continuing"

      - name: Verify WASM artifact exists
        run: |
          test -f wasm/HeliosVault.wasm
          ls -la wasm

      - name: Upload compiled WASM
        uses: actions/upload-artifact@v4
        with:
          name: helios-vault-wasm
          path: contracts/wasm/*.wasm
          if-no-files-found: error
